<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DotnetNiger.UI</title>
    <base href="/" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/svg" href="Logo.svg" />

    <!-- style tailwind -->
    <link href="css/output.css" rel="stylesheet">

    <link href="lib/fontawesome/css/all.min.css" rel="stylesheet" />

    <link rel="stylesheet" href="lib/tinymce/skins/ui/oxide/skin.min.css" />
    <link rel="stylesheet" href="lib/tinymce/skins/ui/oxide/content.min.css" />

    <link href="DotnetNiger.UI.styles.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <div id="app" class="bg-[#F4F2F2]">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui" class="bg-red-600 text-white px-4 py-2 rounded-md">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <!-- Charger TinyMCE depuis npm (mode hors ligne) -->
    <script src="lib/tinymce/tinymce.min.js"></script>
    <!-- Puis charger les fonctions d'initialisation -->
    <script src="tinymce-init.js"></script>
    <!-- Chargement de Blazor -->
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="Script.js"></script>
</body>

</html>
