version: "3.8"

services:
  # API Gateway (port 5500)
  gateway:
    build:
      context: .
      dockerfile: DotnetNiger.Gateway/Dockerfile
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
    depends_on:
      - identity
      - community
    networks:
      - dotnetniger
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Identity API (port 8081 - interne)
  identity:
    build:
      context: .
      dockerfile: DotnetNiger.Identity/Dockerfile
    ports:
      - "8081:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8081
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=DotnetNiger.Identity;User Id=sa;Password=YourPassword123!;TrustServerCertificate=true;
    depends_on:
      - sqlserver
    networks:
      - dotnetniger
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Community API (port 8082 - interne)
  community:
    build:
      context: .
      dockerfile: DotnetNiger.Community/Dockerfile
    ports:
      - "8082:8082"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8082
      # - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=DotnetNiger.Community;User Id=sa;Password=YourPassword123!;TrustServerCertificate=true;
    depends_on:
      - sqlserver
    networks:
      - dotnetniger
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # SQL Server (optionnel - si vous utilisez une BD)
  # sqlserver:
  #   image: mcr.microsoft.com/mssql/server:2022-latest
  #   environment:
  #     - ACCEPT_EULA=Y
  #     - SA_PASSWORD=YourPassword123!
  #     - MSSQL_PID=Developer
  #   ports:
  #     - "1433:1433"
  #   networks:
  #     - dotnetniger
  #   volumes:
  #     - sqlserver_data:/var/opt/mssql
  #   healthcheck:
  #     test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P YourPassword123! -Q "SELECT 1" || exit 1
  #     interval: 10s
  #     timeout: 5s
  #     retries: 3

networks:
  dotnetniger:
    driver: bridge

volumes:
  sqlserver_data:
    driver: local
