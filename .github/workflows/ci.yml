name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore DotnetNiger.slnx

      - name: Build
        run: dotnet build DotnetNiger.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test DotnetNiger.slnx --configuration Release --no-build --verbosity normal
