name: Tests & Quality

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  architecture-guards:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore architecture tests
        run: dotnet restore DotnetNiger.Architecture.Tests/DotnetNiger.Architecture.Tests.csproj

      - name: Run architecture guard tests
        run: dotnet test DotnetNiger.Architecture.Tests/DotnetNiger.Architecture.Tests.csproj --no-restore --configuration Release --verbosity normal

  test:
    runs-on: ubuntu-latest
    env:
      ConnectionStrings__DefaultConnection: "Data Source=:memory:;Mode=Memory;Cache=Shared"

    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore DotnetNiger.slnx

      - name: Build
        run: dotnet build DotnetNiger.slnx --no-restore --configuration Release

      - name: Run tests with coverage
        run: dotnet test DotnetNiger.slnx --no-build --verbosity normal --configuration Release /p:CollectCoverage=true /p:CoverletOutput=./TestResults/coverage/ /p:CoverletOutputFormat=opencover

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          files: "**/TestResults/coverage/coverage.opencover.xml"
          fail_ci_if_error: false

  code-quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore DotnetNiger.slnx

      - name: Check for errors and warnings
        run: dotnet build DotnetNiger.slnx --no-restore --configuration Release /p:TreatWarningsAsErrors=true

  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Dependabot
        run: |
          echo "Checking for vulnerable dependencies..."
